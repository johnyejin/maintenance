<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>항공정비 정리노트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --bg2: #161b27;
  --bg3: #1e2535;
  --bg4: #252d40;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.18);
  --text: #e8eaf0;
  --text2: #9aa3b8;
  --text3: #636b80;
  --purple: #7c6ff7;
  --purple-light: #a89cf8;
  --purple-bg: rgba(124,111,247,0.12);
  --teal: #34d8b5;
  --teal-light: #6de8cc;
  --teal-bg: rgba(52,216,181,0.1);
  --amber: #f5a623;
  --amber-bg: rgba(245,166,35,0.1);
  --blue: #5ba3f5;
  --blue-bg: rgba(91,163,245,0.1);
  --red: #f06060;
  --red-bg: rgba(240,96,96,0.1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 60px 20px 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.wrapper { width: 100%; max-width: 640px; }

/* header */
.header { text-align: center; margin-bottom: 48px; }
.header-tag {
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--purple); margin-bottom: 12px;
}
.header h1 { font-size: 28px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.header p { font-size: 13px; color: var(--text3); line-height: 1.7; }

/* accordion group */
.group { margin-bottom: 12px; border-radius: 14px; overflow: hidden; border: 1px solid var(--border); }

/* accordion trigger */
.group-trigger {
  width: 100%; display: flex; align-items: center; gap: 14px;
  padding: 18px 22px; background: var(--bg3);
  border: none; cursor: pointer; color: var(--text);
  font-family: inherit; transition: background 0.15s;
  text-align: left;
}
.group-trigger:hover { background: var(--bg4); }

.trigger-icon {
  width: 38px; height: 38px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.trigger-body { flex: 1; min-width: 0; }
.trigger-tag {
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; margin-bottom: 3px;
}
.trigger-title { font-size: 16px; font-weight: 700; }
.trigger-count { font-size: 12px; color: var(--text3); margin-top: 2px; }

.chevron {
  width: 20px; height: 20px; flex-shrink: 0;
  color: var(--text3); transition: transform 0.25s;
  display: flex; align-items: center; justify-content: center;
}
.chevron svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.group.open .chevron { transform: rotate(180deg); }

/* accordion body */
.group-body {
  max-height: 0; overflow: hidden;
  transition: max-height 0.3s cubic-bezier(0.4,0,0.2,1);
  background: var(--bg2);
}
.group.open .group-body { max-height: 2000px; }

.body-inner { padding: 8px 14px 14px; display: flex; flex-direction: column; gap: 6px; }

/* file card */
.file-card {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px; border-radius: 10px;
  background: var(--bg3); border: 1px solid var(--border);
  text-decoration: none; color: var(--text);
  transition: background 0.15s, border-color 0.15s, transform 0.12s;
}
.file-card:hover {
  background: var(--bg4); border-color: var(--border2);
  transform: translateX(3px);
}
.file-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.file-info { flex: 1; min-width: 0; }
.file-title { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
.file-desc { font-size: 12px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.file-arrow { font-size: 14px; color: var(--text3); flex-shrink: 0; transition: color 0.15s; }
.file-card:hover .file-arrow { color: var(--text2); }

/* empty state */
.empty {
  padding: 20px 16px; text-align: center;
  font-size: 13px; color: var(--text3);
  border-radius: 10px; border: 1px dashed var(--border2);
}

/* footer */
.footer { margin-top: 48px; text-align: center; font-size: 12px; color: var(--text3); line-height: 2; }
.footer code {
  font-family: monospace; font-size: 11px;
  background: var(--bg3); padding: 2px 7px;
  border-radius: 4px; color: var(--teal-light);
}

/* color themes */
.theme-amber .trigger-icon { background: var(--amber-bg); }
.theme-amber .trigger-tag { color: var(--amber); }
.theme-amber .file-dot { background: var(--amber); }

.theme-blue .trigger-icon { background: var(--blue-bg); }
.theme-blue .trigger-tag { color: var(--blue); }
.theme-blue .file-dot { background: var(--blue); }

.theme-purple .trigger-icon { background: var(--purple-bg); }
.theme-purple .trigger-tag { color: var(--purple-light); }
.theme-purple .file-dot { background: var(--purple); }

.theme-teal .trigger-icon { background: var(--teal-bg); }
.theme-teal .trigger-tag { color: var(--teal-light); }
.theme-teal .file-dot { background: var(--teal); }

.theme-red .trigger-icon { background: var(--red-bg); }
.theme-red .trigger-tag { color: var(--red); }
.theme-red .file-dot { background: var(--red); }

@media (max-width: 480px) {
  .header h1 { font-size: 22px; }
  .group-trigger { padding: 14px 16px; }
  .trigger-title { font-size: 15px; }
}
</style>
</head>
<body>
<div class="wrapper">

  <div class="header">
    <div class="header-tag">Aircraft Maintenance</div>
    <h1>시험 정리노트 📚</h1>
    <p>학기 및 시험 종류를 선택하세요.</p>
  </div>

  <div id="accordion"></div>

  <div class="footer">
    @Copyright 2025 johnyejin. All rights reserved.<br>
  </div>

</div>

<script>
const FILE_GROUPS = [
  {
    id: "g1",
    label: "2학년 1학기",
    title: "2-1 기말 📙",
    icon: "📙",
    theme: "amber",
    files: [
      { title: "동력장치",   desc: "엔진 구조 · 작동 원리 · 성능 · 정비",            path: "2-1 기말/동력장치.html" },
      { title: "유압계통",   desc: "유압 원리 · 구성 요소 · 계통 구조 · 고장",        path: "2-1 기말/유압계통.html" },
      { title: "전기장비",   desc: "전원 · BUS · 배터리 · B737 패널 · C172 회로",  path: "2-1 기말/전기장비.html" },
    ]
  },
  {
    id: "g2",
    label: "2학년 2학기",
    title: "2-2 중간 📘",
    icon: "📘",
    theme: "blue",
    files: []
  },
  {
    id: "g3",
    label: "2학년 2학기",
    title: "2-2 기말 📗",
    icon: "📗",
    theme: "teal",
    files: []
  },
];

/* ── 렌더링 (수정 불필요) ── */
const container = document.getElementById('accordion');

FILE_GROUPS.forEach(group => {
  const el = document.createElement('div');
  el.className = `group theme-${group.theme}`;
  el.id = group.id;

  const fileCount = group.files.length;
  const countText = fileCount > 0 ? `${fileCount}개 파일` : '파일 없음';

  const filesHTML = fileCount > 0
    ? group.files.map(f => `
        <a class="file-card" href="${f.path}">
          <div class="file-dot"></div>
          <div class="file-info">
            <div class="file-title">${f.title}</div>
            <div class="file-desc">${f.desc}</div>
          </div>
          <div class="file-arrow">→</div>
        </a>`).join('')
    : `<div class="empty">아직 추가된 파일이 없습니다.<br>FILE_GROUPS 배열에 파일을 추가해보세요.</div>`;

  el.innerHTML = `
    <button class="group-trigger" onclick="toggle('${group.id}')">
      <div class="trigger-icon">${group.icon}</div>
      <div class="trigger-body">
        <div class="trigger-tag">${group.label}</div>
        <div class="trigger-title">${group.title}</div>
        <div class="trigger-count">${countText}</div>
      </div>
      <div class="chevron">
        <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </button>
    <div class="group-body">
      <div class="body-inner">${filesHTML}</div>
    </div>`;

  container.appendChild(el);
});

/* 첫 번째 그룹 기본으로 열어두기 */
document.getElementById(FILE_GROUPS[0].id)?.classList.add('open');

function toggle(id) {
  const el = document.getElementById(id);
  const isOpen = el.classList.contains('open');
  document.querySelectorAll('.group').forEach(g => g.classList.remove('open'));
  if (!isOpen) el.classList.add('open');
}
</script>
</body>
</html>
